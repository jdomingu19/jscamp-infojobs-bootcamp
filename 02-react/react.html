<!-- Module 3: JavaScript: React HTML -->
<!doctype html>
<html lang="en">
  <head>
    <title>DevJobs - Jobs</title>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="List with jobs and filters to find the job of your dreams."
    />

    <!-- External CSS file linked to the HTML document -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Load React and ReactDOM from esm.sh CDN -->
    <script type="module">
      import React from "https://esm.sh/react?dev";
      import ReactDOM from "https://esm.sh/react-dom/client?dev";

      // Expose React and ReactDOM globally for use with Babel transpilation
      window.React = React;
      window.ReactDOM = ReactDOM;
    </script>

    <!-- Load Babel standalone to transpile JSX directly in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Use type='text/babel' so Babel can transpile JSX into JavaScript -->
    <script type="text/babel">
      // Functional component that renders a single job card with props and dataset attributes
      function JobCard({ data, title, company, location, description }) {
        // Event handler that shows an alert when the Apply button is clicked
        function handleClick() {
          alert(`You have applied to ${title}`);
        }

        return (
          <article
            className="job-listing-card"
            data-technology={data?.technology}
            data-location={data?.location}
            data-level={data?.level}
          >
            <div>
              <h3>{title}</h3>
              <small>
                sma {company} | {location}
              </small>
              <p>{description}</p>
            </div>
            <button className="button-apply-job" onClick={handleClick}>
              Apply
            </button>
          </article>
        );
      }

      // Main App component that renders multiple JobCard components inside a listings container
      function App() {
        return (
          <div className="jobs-listings">
            <JobCard
              title="Frontend Developer"
              company="Tech Solutions Inc."
              location="Remote"
              description="We are looking for a frontend developer with experience in React, TypeScript and Tailwind CSS."
              data={{
                technology: ["react", "typescript", "tailwindcss"],
                location: "remote",
                level: "mid-level",
              }}
            />
            <JobCard
              title="Senior Software Engineer"
              company="Data Driven Co."
              location="Barcelona"
              description="We are looking for a software engineer with experience in web development."
              data={{
                technology: ["typescript", "next.js", "node.js"],
                location: "barcelona",
                level: "senior",
              }}
            />
          </div>
        );
      }

      // Select the root container and render the React App inside it
      const rootElement = document.querySelector("#root");
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
  </head>

  <body>
    <!-- The header contains the site branding and navigation -->
    <header>
      <h1>
        <svg
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        DevJobs
      </h1>

      <nav>
        <a href="./index.html">Home Page</a>
        <!-- <a href="./jobs.html">Jobs</a> -->
      </nav>

      <!-- Avatar components rendered with different services, usernames, and sizes -->
      <div>
        <devjobs-avatar
          service="github"
          username="jdomingu19"
          size="24"
        ></devjobs-avatar>
      </div>
    </header>

    <!-- The main section holds the core page content -->
    <main>
      <!-- Section dedicated to the job search functionality -->
      <section class="jobs-search">
        <h1>React.js - First Steps</h1>
      </section>

      <section>
        <h2>Available Jobs</h2>
        <!-- Root container where React will mount and render the App component -->
        <div id="root"></div>
      </section>
    </main>

    <!-- The footer provides closing information and legal notice -->
    <footer style="padding-bottom: 2000px">
      <small>&copy 2026 DevJobs. All rights reserved.</small>
    </footer>
  </body>
</html>
