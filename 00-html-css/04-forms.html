<!-- Module 2: HTML & CSS: Forms -->
<!doctype html>
<html lang="en">
  <head>
    <title>DevJobs - Home Page</title>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Find the best job offers for developers on DevJobs."
    />
  </head>

  <body>
    <!-- The header contains the site branding and navigation -->
    <header>
      <h2>DevJobs</h2>

      <nav>
        <a href="">Home Page</a>
        <a href="">Jobs</a>
      </nav>

      <div>
        <a href="">Post a job</a>
        <a href="">Login</a>
      </div>
    </header>

    <!-- The main section holds the core page content -->
    <main>
      <section>
        <img src="./background.webp" alt="" width="200" />

        <h1>Find your dream job</h1>

        <p>
          Join the largest community of developers and find your next
          opportunity.
        </p>

        <!-- The form provides a search interface for job listings -->
        <form role="search">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-search"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
            <path d="M21 21l-6 -6" />
          </svg>

          <!-- Input field allows users to type search queries -->
          <input
            required
            type="text"
            name=""
            id=""
            placeholder="Search jobs by title, skill or company"
          />

          <!-- Submit button triggers the search action -->
          <button type="submit">Search</button>
        </form>
      </section>
    </main>

    <!-- The footer provides closing information and links -->
    <footer style="padding-bottom: 10000px"></footer>
  </body>
</html>
